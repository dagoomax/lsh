<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LSH API — Swagger UI</title>
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css">
<style>
  body { margin: 0; background: #0f1117; }
  .topbar { display: none; }               /* hide Swagger's URL bar */
  .lsh-head {
    font: 600 14px/1.4 -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #eef1f6; background: #12151d; border-bottom: 1px solid #2a2f3a;
    padding: 12px 20px; display: flex; align-items: center; gap: 10px;
  }
  .lsh-head .pill { font-weight: 500; font-size: 12px; color: #9aa4b0; background: #1b2028; border: 1px solid #2a2f3a; border-radius: 999px; padding: 3px 10px; }
  .lsh-head button { margin-left: auto; color: #5ea0ff; background: none; border: none; cursor: pointer; font-weight: 500; font-size: 13px; }
  .lsh-err { color: #ff8a95; padding: 20px; font: 14px/1.5 ui-monospace, Menlo, monospace; max-width: 900px; margin: 0 auto; }
  #swagger-ui { max-width: 1100px; margin: 0 auto; }
</style>
</head>
<body>
<div class="lsh-head">
  🧩 LSH — LoxoneSwaggerHelper API
  <span class="pill">OpenAPI 3.0</span>
  <button onclick="lshDownloadSpec()">Download openapi.json</button>
</div>
<div id="swagger-ui"></div>

<!-- The spec is injected inline by the /api-docs route (which is auth-gated), so
     there is no separate unauthenticated fetch of /openapi.json to hang on. -->
<script>window.__LSH_OPENAPI__ = __OPENAPI_SPEC__;</script>
<script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin></script>
<script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js" crossorigin></script>
<script>
  function lshDownloadSpec() {
    const blob = new Blob([JSON.stringify(window.__LSH_OPENAPI__, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'openapi.json'; a.click();
    URL.revokeObjectURL(a.href);
  }
  window.onload = function () {
    var spec = window.__LSH_OPENAPI__;
    if (!spec || typeof spec !== 'object' || !spec.openapi) {
      document.getElementById('swagger-ui').innerHTML =
        '<div class="lsh-err">Could not load the API spec. Regenerate it with <code>npm run openapi</code> and reload.</div>';
      return;
    }
    if (typeof SwaggerUIBundle === 'undefined') {
      document.getElementById('swagger-ui').innerHTML =
        '<div class="lsh-err">Swagger UI failed to load from the CDN (no internet on this network?). ' +
        'The spec is available via the Download button above.</div>';
      return;
    }
    window.ui = SwaggerUIBundle({
      spec: spec,
      dom_id: '#swagger-ui',
      deepLinking: true,
      docExpansion: 'none',
      filter: true,
      tryItOutEnabled: true,
      persistAuthorization: true,
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
      layout: 'StandaloneLayout',
      // "Try it out" runs same-origin, so the browser sends the lsh-session
      // cookie automatically. Add ?token= via the Authorize button for tokens.
      requestInterceptor: function (req) { req.credentials = 'same-origin'; return req; },
    });
  };
</script>
</body>
</html>
