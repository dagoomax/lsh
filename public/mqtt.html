<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MQTT Explorer – LSHServer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="mqtt.css">
  <link rel="stylesheet" href="beauty-base.css">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('lsh-theme')||'dark')</script>
</head>
<body>
  <header>
    <div class="logo"><svg class="logo-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="lsh-g" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#3fb950"/><stop offset="1" stop-color="#58a6ff"/></linearGradient></defs><rect width="40" height="40" rx="10" fill="url(#lsh-g)"/><path fill-rule="evenodd" fill="white" d="M6 21L20 8L34 21V35H6Z M21 10L11 22H20L19 30L29 18H20Z"/></svg><span class="logo-text">LSHServer</span></div>
    <nav class="header-nav">
      <a href="/" class="nav-link" data-i18n="nav.dashboard">Dashboard</a>
      <a href="/settings.html" class="nav-link" data-i18n="nav.settings">Settings</a>
      <a href="/logs.html" class="nav-link" data-i18n="nav.logs">Logs</a>
      <a href="/mqtt.html" class="nav-link active">MQTT</a>
    </nav>
    <button class="theme-toggle" id="btn-theme"></button>
    <div class="mqtt-header-stats">
      <span id="mqtt-status-badge" class="mqtt-badge mqtt-badge--disconnected" data-i18n="mqttpage.disconnected">Disconnected</span>
      <span id="mqtt-topic-count" class="mqtt-stat">0 topics</span>
      <span id="mqtt-rate" class="mqtt-stat">0 msg/s</span>
    </div>
  </header>

  <div class="mqtt-layout">
    <!-- Left: topic list -->
    <aside class="mqtt-sidebar">
      <div class="mqtt-search-bar">
        <input type="search" id="mqtt-search" class="mqtt-search-input" data-i18n-placeholder="mqttpage.filter" placeholder="Filter topics…">
        <button class="btn btn-sm" id="btn-mqtt-clear" data-i18n="mqttpage.clear" title="Clear all retained data">Clear</button>
      </div>
      <div class="mqtt-topic-list" id="mqtt-topic-list">
        <div class="mqtt-empty" id="mqtt-empty" data-i18n="mqttpage.waiting">Waiting for messages…</div>
      </div>
    </aside>

    <!-- Right: topic detail -->
    <main class="mqtt-detail" id="mqtt-detail">
      <div class="mqtt-detail-placeholder">
        <p data-i18n="mqttpage.select_topic">Select a topic to inspect</p>
      </div>
    </main>
  </div>

  <script src="i18n.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="mqtt.js"></script>
  <script src="theme.js"></script>
  <script src="common.js"></script>
</body>
</html>
