    <rect class="furn" x="1105" y="452" width="90" height="90"/>
    <path class="furnln" d="M 1105 452 L 1195 542 M 1195 452 L 1105 542"/>
    <circle class="furn" cx="1183" cy="464" r="7"/>
    <rect class="furn" x="1028" y="512" width="58" height="30" rx="4"/>
    <ellipse class="furn" cx="1057" cy="480" rx="24" ry="30"/>
    <rect class="furn" x="958" y="362" width="48" height="110"/>
    <ellipse class="furnln" cx="982" cy="417" rx="14" ry="32"/>
  </g>

  <!-- bedroom 2 -->
  <g>
    <rect class="furn" x="1000" y="565" width="150" height="210" rx="4"/>
    <rect class="furn" x="1012" y="574" width="56" height="42" rx="8"/>
    <rect class="furn" x="1082" y="574" width="56" height="42" rx="8"/>
    <line class="furnln" x1="1000" y1="710" x2="1150" y2="710"/>
    <rect class="furn" x="938" y="565" width="50" height="50" rx="3"/>
    <rect class="furn" x="720" y="560" width="200" height="56"/>
    <line class="furnln" x1="720" y1="588" x2="920" y2="588"/>
    <line class="furnln" x1="820" y1="560" x2="820" y2="616"/>
    <rect class="furn" x="715" y="748" width="56" height="148" rx="3"/>
