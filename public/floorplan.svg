<svg viewBox="-150 -150 1520 1330" xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Furnished floor plan: open kitchen, dining and living room with balcony on the left; hall in the centre; master bedroom with ensuite bath, guest bath and second bedroom on the right.">
  <style>
    .wall  { fill: #2B2E2E; }
    .furn  { fill: #FCFBF8; stroke: #2B2E2E; stroke-width: 3; }
    .furnln{ fill: none; stroke: #2B2E2E; stroke-width: 2.5; }
    .soft  { fill: none; stroke: #6F756F; stroke-width: 2; }
    .rug   { fill: none; stroke: #6F756F; stroke-width: 2.5; stroke-dasharray: 10 8; }
    .deck  { stroke: #6F756F; stroke-width: 1.5; opacity: .55; }
    .leaf  { stroke: #2B2E2E; stroke-width: 4; }
    .swing { fill: none; stroke: #6F756F; stroke-width: 1.75; stroke-dasharray: 7 6; }
    .win   { fill: #FCFBF8; stroke: #2B2E2E; stroke-width: 2.5; }
    .winln { stroke: #2B2E2E; stroke-width: 1.75; }
    .rail  { fill: none; stroke: #2B2E2E; stroke-width: 8; }
    .dim   { stroke: #2F7A6F; stroke-width: 1.75; }
    .dimtxt{ font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
             font-size: 24px; fill: #2F7A6F; letter-spacing: .08em; }
    text   { font-family: "Avenir Next", Avenir, Futura, "Century Gothic", "Trebuchet MS", sans-serif; }
    .rmlabel { font-size: 27px; font-weight: 600; letter-spacing: .18em; fill: #2B2E2E; }
    .rmarea  { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
               font-size: 21px; fill: #6F756F; letter-spacing: .04em; }
    .tiny  { font-size: 15px; letter-spacing: .12em; fill: #6F756F; font-weight: 600; }
    .north { fill: none; stroke: #2B2E2E; stroke-width: 2.5; }
  </style>

  <!-- sheet background -->
  <rect x="-150" y="-150" width="1520" height="1330" fill="#FCFBF8"/>

  <!-- room floor tints -->
  <rect fill="#E9EFE4" x="0"   y="0"   width="520" height="900"/>
  <rect fill="#F2F0E8" x="520" y="0"   width="180" height="900"/>
  <rect fill="#F2EAD9" x="700" y="0"   width="500" height="350"/>
  <rect fill="#DFE8EE" x="700" y="350" width="250" height="200"/>
  <rect fill="#DFE8EE" x="950" y="350" width="250" height="200"/>
  <rect fill="#F2EAD9" x="700" y="550" width="500" height="350"/>
  <rect fill="#E2EADF" x="0"   y="900" width="500" height="160"/>

  <!-- balcony decking -->
  <g class="deck">
    <line x1="45"  y1="902" x2="45"  y2="1056"/><line x1="90"  y1="902" x2="90"  y2="1056"/>
    <line x1="135" y1="902" x2="135" y2="1056"/><line x1="180" y1="902" x2="180" y2="1056"/>
    <line x1="225" y1="902" x2="225" y2="1056"/><line x1="270" y1="902" x2="270" y2="1056"/>
    <line x1="315" y1="902" x2="315" y2="1056"/><line x1="360" y1="902" x2="360" y2="1056"/>
    <line x1="405" y1="902" x2="405" y2="1056"/><line x1="450" y1="902" x2="450" y2="1056"/>
  </g>
  <path class="rail" d="M 4 902 L 4 1056 L 496 1056 L 496 902"/>

  <!-- walls -->
  <path class="wall" fill-rule="evenodd"
        d="M -20 -20 H 1220 V 920 H -20 Z M 0 0 V 900 H 1200 V 0 Z"/>
  <rect class="wall" x="515" y="0"   width="10" height="250"/>
  <rect class="wall" x="515" y="750" width="10" height="150"/>
  <rect class="wall" x="695" y="0"   width="10" height="150"/>
  <rect class="wall" x="695" y="240" width="10" height="170"/>
  <rect class="wall" x="695" y="490" width="10" height="130"/>
  <rect class="wall" x="695" y="710" width="10" height="190"/>
  <rect class="wall" x="695"  y="345" width="315" height="10"/>
  <rect class="wall" x="1100" y="345" width="105" height="10"/>
  <rect class="wall" x="695" y="545" width="510" height="10"/>
  <rect class="wall" x="945" y="345" width="10" height="210"/>

  <!-- entry door -->
  <rect x="540" y="-20" width="100" height="20" fill="#FCFBF8"/>
  <line class="leaf" x1="540" y1="0" x2="540" y2="100"/>
  <path class="swing" d="M 640 0 A 100 100 0 0 1 540 100"/>

  <!-- balcony sliding door -->
  <rect x="120" y="900" width="260" height="20" fill="#FCFBF8"/>
  <rect class="furn" x="120" y="902" width="140" height="7"/>
  <rect class="furn" x="240" y="911" width="140" height="7"/>

