    <rect class="win" x="850"  y="-20"  width="200" height="20"/><line class="winln" x1="850" y1="-10" x2="1050" y2="-10"/>
    <rect class="win" x="-20"  y="400"  width="20"  height="250"/><line class="winln" x1="-10" y1="400" x2="-10" y2="650"/>
    <rect class="win" x="1200" y="400"  width="20"  height="90"/><line class="winln" x1="1210" y1="400" x2="1210" y2="490"/>
    <rect class="win" x="880"  y="900"  width="200" height="20"/><line class="winln" x1="880" y1="910" x2="1080" y2="910"/>
  </g>

  <!-- interior doors -->
  <line class="leaf" x1="700" y1="150" x2="790" y2="150"/>
  <path class="swing" d="M 790 150 A 90 90 0 0 1 700 240"/>
  <line class="leaf" x1="700" y1="410" x2="780" y2="410"/>
  <path class="swing" d="M 780 410 A 80 80 0 0 1 700 490"/>
  <line class="leaf" x1="700" y1="710" x2="790" y2="710"/>
  <path class="swing" d="M 700 620 A 90 90 0 0 1 790 710"/>
  <line class="leaf" x1="1010" y1="350" x2="1010" y2="440"/>
  <path class="swing" d="M 1100 350 A 90 90 0 0 1 1010 440"/>

