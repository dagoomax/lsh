  <!-- labels -->
  <g text-anchor="middle">
    <text class="rmlabel" x="258" y="150">KITCHEN</text>
    <text class="rmlabel" x="255" y="588">LIVING · DINING</text>
    <text class="rmarea"  x="255" y="618">46.8 m²</text>
    <text class="rmlabel" x="610" y="778" transform="rotate(-90 610 778)">HALL</text>
    <text class="rmarea"  x="610" y="850">16.2 m²</text>
    <text class="rmlabel" x="830" y="272">BEDROOM 1</text>
    <text class="rmarea"  x="1122" y="272">17.5 m²</text>
    <text class="rmlabel" x="815" y="442" font-size="20">BATH 1</text>
    <text class="rmlabel" x="1053" y="392" font-size="20">BATH 2</text>
    <text class="rmlabel" x="900" y="690">BEDROOM 2</text>
    <text class="rmarea"  x="900" y="718">17.5 m²</text>
    <text class="rmlabel" x="250" y="948" font-size="22">BALCONY</text>
    <text class="rmarea"  x="380" y="948" font-size="18" text-anchor="start">8.3 m²</text>
  </g>

  <!-- dimensions -->
  <g>
    <line class="dim" x1="0" y1="-70" x2="1200" y2="-70"/>
    <line class="dim" x1="0" y1="-82" x2="0" y2="-58"/>
    <line class="dim" x1="1200" y1="-82" x2="1200" y2="-58"/>
    <line class="dim" x1="0" y1="-58" x2="0" y2="-30"/>
    <line class="dim" x1="1200" y1="-58" x2="1200" y2="-30"/>
    <text class="dimtxt" x="600" y="-86" text-anchor="middle">12.00 m</text>
    <line class="dim" x1="-70" y1="0" x2="-70" y2="900"/>
    <line class="dim" x1="-82" y1="0" x2="-58" y2="0"/>
    <line class="dim" x1="-82" y1="900" x2="-58" y2="900"/>
    <line class="dim" x1="-58" y1="0" x2="-30" y2="0"/>
    <line class="dim" x1="-58" y1="900" x2="-30" y2="900"/>
    <text class="dimtxt" x="-86" y="450" text-anchor="middle" transform="rotate(-90 -86 450)">9.00 m</text>
