    <rect class="wall" x="48" y="712" width="8" height="126" rx="3"/>
    <rect class="furn" x="335" y="625" width="95" height="220" rx="14"/>
    <line class="furnln" x1="408" y1="638" x2="408" y2="832"/>
    <line class="furnln" x1="335" y1="735" x2="408" y2="735"/>
    <circle class="furn" cx="222" cy="718" r="46"/>
    <circle class="soft" cx="222" cy="718" r="28"/>
    <rect class="furn" x="78" y="592" width="84" height="84" rx="16"/>
    <line class="furnln" x1="92" y1="662" x2="148" y2="662"/>
    <circle class="furn" cx="472" cy="862" r="25"/>
    <path class="soft" d="M 458 852 Q 472 838 486 852 M 460 872 Q 472 884 484 872 M 472 842 V 882"/>
