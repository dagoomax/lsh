  <g>
    <rect class="furn" x="855" y="362" width="85" height="178" rx="8"/>
    <rect class="furnln" x="866" y="374" width="63" height="154" rx="24"/>
    <circle class="furnln" cx="898" cy="392" r="6"/>
    <rect class="furn" x="737" y="512" width="58" height="30" rx="4"/>
    <ellipse class="furn" cx="766" cy="480" rx="24" ry="30"/>
    <rect class="furn" x="758" y="358" width="118" height="48"/>
    <ellipse class="furnln" cx="817" cy="382" rx="34" ry="15"/>
  </g>

