  <g>
    <rect x="620" y="1000" width="100" height="10" fill="#2B2E2E"/>
    <rect x="720" y="1000" width="100" height="10" class="furn" stroke-width="2"/>
    <rect x="820" y="1000" width="100" height="10" fill="#2B2E2E"/>
    <rect x="920" y="1000" width="100" height="10" class="furn" stroke-width="2"/>
    <g class="dimtxt" font-size="20" text-anchor="middle" fill="#6F756F">
