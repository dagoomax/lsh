    <circle class="furnln" cx="22" cy="180" r="11"/><circle class="furnln" cx="47" cy="180" r="11"/>
    <circle class="furnln" cx="22" cy="212" r="11"/><circle class="furnln" cx="47" cy="212" r="11"/>
    <rect class="furn" x="445" y="5" width="72" height="70"/>
    <line class="furnln" x1="481" y1="5" x2="481" y2="75"/>
    <text class="tiny" x="481" y="100" text-anchor="middle">REF</text>
    <rect class="furn" x="160" y="200" width="230" height="90" rx="4"/>
    <line class="soft" x1="160" y1="245" x2="390" y2="245"/>
    <circle class="furn" cx="212" cy="322" r="17"/>
    <circle class="furn" cx="275" cy="322" r="17"/>
    <circle class="furn" cx="338" cy="322" r="17"/>
  </g>

  <!-- dining -->
  <g>
    <rect class="furn" x="130" y="400" width="250" height="120" rx="6"/>
    <rect class="furn" x="160" y="358" width="52" height="36" rx="8"/>
    <rect class="furn" x="298" y="358" width="52" height="36" rx="8"/>
    <rect class="furn" x="160" y="526" width="52" height="36" rx="8"/>
    <rect class="furn" x="298" y="526" width="52" height="36" rx="8"/>
