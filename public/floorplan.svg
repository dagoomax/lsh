  <!-- north arrow + scale bar -->
  <g>
    <circle class="north" cx="1300" cy="-60" r="34"/>
    <path d="M 1300 -84 L 1312 -48 L 1300 -57 L 1288 -48 Z" fill="#2B2E2E"/>
    <text class="tiny" x="1300" y="0" text-anchor="middle">N</text>
