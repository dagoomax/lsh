    <rect class="furn" x="892" y="30" width="62" height="44" rx="8"/>
    <rect class="furn" x="966" y="30" width="62" height="44" rx="8"/>
    <line class="furnln" x1="880" y1="170" x2="1040" y2="170"/>
    <rect class="furn" x="812" y="20" width="55" height="55" rx="3"/>
    <rect class="furn" x="1053" y="20" width="55" height="55" rx="3"/>
    <rect class="furn" x="730" y="285" width="230" height="58"/>
    <line class="furnln" x1="730" y1="314" x2="960" y2="314"/>
    <line class="furnln" x1="845" y1="285" x2="845" y2="343"/>
    <rect class="furn" x="1145" y="130" width="48" height="110" rx="3"/>
